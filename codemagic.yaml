workflows:
  ios-build:
    name: iOS Build
    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Set iOS deployment target
        script: |
          sed -i '' 's/platform :ios, .*/platform :ios, "15.5"/' ios/Podfile

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Flutter build iOS
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
